<!-- FILE: mobile_workbench_page.html -->
{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>工作台</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <style>
      :root {
        --bg-body: #F4F6F9;
        --card-bg: rgba(255,255,255,0.8);
      }
      body { 
        background-color: var(--bg-body);
        background-image: radial-gradient(circle at 10% 10%, #e0e7ff 0%, #f4f6f9 40%);
        background-attachment: fixed;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding-bottom: 90px;
      }
      
      .page-title {
          padding: 30px 24px 10px 24px;
          font-size: 28px; font-weight: 800; color: #111827;
          letter-spacing: -0.5px;
      }
      
      /* 玻璃容器 */
      .glass-container {
          margin: 10px 20px;
          background: var(--card-bg);
          backdrop-filter: blur(12px);
          border-radius: 24px;
          padding: 24px;
          box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
          border: 1px solid rgba(255,255,255,0.6);
      }

      /* 网格 */
      .app-grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 24px 12px;
      }
      
      /* 图标卡片 */
      .app-icon-card {
          text-decoration: none;
          color: #333;
          display: flex;
          flex-direction: column;
          align-items: center;
          transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .app-icon-card:active { transform: scale(0.9); opacity: 0.8; }
      
      /* 图标盒子 (Squircle) */
      .icon-box {
          width: 60px; height: 60px;
          border-radius: 18px; /* 超圆角 */
          display: flex; align-items: center; justify-content: center;
          margin-bottom: 10px;
          font-size: 26px;
          color: white;
          box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      }
      .app-name { 
          font-size: 13px; font-weight: 600; color: #4B5563;
          text-align: center;
      }

      /* 高饱和渐变 */
      .grad-blue { background: linear-gradient(135deg, #2563EB, #60A5FA); }
      .grad-purple { background: linear-gradient(135deg, #7C3AED, #A78BFA); }
      .grad-pink { background: linear-gradient(135deg, #DB2777, #F472B6); }
      .grad-green { background: linear-gradient(135deg, #059669, #34D399); }
      .grad-orange { background: linear-gradient(135deg, #EA580C, #FB923C); }
      .grad-gray { background: #E5E7EB; color: #9CA3AF; box-shadow: none; }

      /* 动画 */
      .animate-in { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  {% include 'mobile_ui.html' %}
  {% include 'mobile_topbar.html' %}
  
  <div class="fade-target" id="pageRoot">
    <div class="page-title animate-in">工作台</div>
    
    <div class="glass-container animate-in" style="animation-delay: 0.1s;">
        <div class="app-grid">
            <!-- 任务管理 -->
            <a href="/m/tasks/" class="app-icon-card">
                <div class="icon-box grad-blue">
                    <i class="fas fa-check-double"></i>
                </div>
                <div class="app-name">任务管理</div>
            </a>

            <!-- 工作日志 -->
            <a href="/m/logs/" class="app-icon-card">
                <div class="icon-box grad-pink">
                    <i class="fas fa-book-open"></i>
                </div>
                <div class="app-name">工作日志</div>
            </a>

            <!-- 日程视图 -->
            <a href="/m/views/" class="app-icon-card">
                <div class="icon-box grad-purple">
                    <i class="fas fa-calendar-alt"></i>
                </div>
                <div class="app-name">日程视图</div>
            </a>

            <!-- 消息通知 -->
            <a href="/m/notifications/" class="app-icon-card">
                 <div class="icon-box grad-orange">
                    <i class="fas fa-bell"></i>
                </div>
                <div class="app-name">消息通知</div>
            </a>
            
            <!-- 员工管理 (保留入口，哪怕你不用) -->
            <a href="/m/employees/" class="app-icon-card">
                 <div class="icon-box grad-green">
                    <i class="fas fa-users"></i>
                </div>
                <div class="app-name">员工管理</div>
            </a>

            <!-- 更多 -->
            <div class="app-icon-card">
                <div class="icon-box grad-gray">
                    <i class="fas fa-ellipsis-h"></i>
                </div>
                <div class="app-name">更多</div>
            </div>
        </div>
    </div>
  </div>
  
  {% include 'mobile_nav.html' %}
  
  <script>
    document.addEventListener('DOMContentLoaded', function(){ 
        MobileUI.fadeIn('#pageRoot'); 
        MobileUI.bindNavFade('#pageRoot'); 
    });
  </script>
</body>
</html>
