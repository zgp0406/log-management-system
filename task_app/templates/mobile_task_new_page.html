<!-- FILE: mobile_task_new_page.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>新建任务</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  :root {
    --bg-body: #F5F7FA;
    --primary-grad: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
  }
  body { 
    background: var(--bg-body);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding-bottom: 40px;
  }
  
  /* 顶部导航 */
  .nav-header {
    padding: 16px;
    display: flex; align-items: center;
    background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 100;
  }
  .nav-back { color: #333; font-size: 18px; text-decoration: none; margin-right: 16px; }
  .nav-title { font-weight: 700; font-size: 18px; flex-grow: 1; }

  /* 表单卡片 */
  .form-card {
    background: #fff;
    border-radius: 20px;
    padding: 24px;
    margin-top: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    border: 1px solid rgba(0,0,0,0.02);
  }

  .form-label { font-size: 13px; font-weight: 600; color: #64748B; margin-bottom: 6px; }
  
  /* 现代输入框 */
  .modern-input, .form-select, .form-control {
    background: #F8FAFC;
    border: 1px solid #E2E8F0;
    border-radius: 12px;
    padding: 12px;
    font-size: 15px;
    color: #334155;
    transition: all 0.2s;
  }
  .modern-input:focus, .form-select:focus, .form-control:focus {
    background: #fff;
    border-color: #6366F1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    outline: none;
  }
  
  /* 文件上传美化 */
  .file-upload-wrapper {
    position: relative;
    height: 100px;
    border: 2px dashed #CBD5E1;
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #F8FAFC;
    transition: all 0.2s;
    color: #94A3B8;
  }
  .file-upload-wrapper:hover { border-color: #6366F1; color: #6366F1; background: #EEF2FF; }
  .file-upload-input {
    position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer;
  }

  /* 提交按钮 */
  .btn-submit {
    background: var(--primary-grad);
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-weight: 600;
    font-size: 16px;
    box-shadow: 0 8px 20px -4px rgba(79, 70, 229, 0.4);
    transition: transform 0.2s;
  }
  .btn-submit:active { transform: scale(0.98); }

  /* 动画 */
  .fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; transform: translateY(10px); }
  @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
{% include 'mobile_ui.html' %}

<div class="nav-header">
  <a href="/m/tasks/" class="nav-back"><i class="fas fa-arrow-left"></i></a>
  <div class="nav-title">创建新任务</div>
</div>

<div class="container px-3">
  <form id="newTaskForm" class="form-card fade-in" enctype="multipart/form-data" onsubmit="return submitNewTask(event)">
    <div class="mb-3">
      <label class="form-label">任务名称</label>
      <input name="task_name" class="form-control" placeholder="简要描述任务内容" required>
    </div>
    
    <div class="mb-3">
      <label class="form-label">详细描述</label>
      <textarea name="description" class="form-control" rows="4" placeholder="输入任务详情..."></textarea>
    </div>
    
    <div class="row g-3 mb-3">
      <div class="col-6">
        <label class="form-label">优先级</label>
        <select name="priority" class="form-select">
          <option value="HIGH">🔴 高</option>
          <option value="MEDIUM" selected>🟠 中</option>
          <option value="LOW">🟢 低</option>
        </select>
      </div>
      <div class="col-6">
        <label class="form-label">项目来源</label>
        <input name="project_source" class="form-control" placeholder="可选">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label">执行人 ID <span class="text-danger">*</span></label>
      <div class="input-group">
        <span class="input-group-text bg-light border-0"><i class="fas fa-user-tag text-muted"></i></span>
        <input name="assignee_id" class="form-control border-start-0 ps-0" placeholder="输入员工工号/ID" required style="border-radius: 0 12px 12px 0;">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label">附件图片</label>
      <div class="file-upload-wrapper">
        <i class="fas fa-cloud-upload-alt fa-2x mb-2"></i>
        <div class="small">点击上传图片</div>
        <input type="file" name="attachment" class="file-upload-input" accept="image/*" onchange="this.previousElementSibling.textContent = this.files[0] ? this.files[0].name : '点击上传图片'">
      </div>
    </div>

    <button class="btn btn-primary w-100 btn-submit" type="submit">立即创建</button>
  </form>
  
  <div class="text-center mt-3 text-muted small fade-in" style="animation-delay: 0.1s;">
    <i class="fas fa-info-circle me-1"></i> 创建成功后将自动返回工作台
  </div>
</div>

{% include 'mobile_nav.html' %}
<script>
MobileUI.fadeIn('body');
MobileUI.bindNavFade('body');
async function submitNewTask(e){
  e.preventDefault();
  const btn = document.querySelector('.btn-submit');
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 处理中...';
  
  const formEl = document.getElementById('newTaskForm');
  const fd = new FormData(formEl);
  try{
    const r = await fetch('/tasks/api/create/', { method:'POST', body: fd, credentials:'include' });
    const j = await r.json();
    if(j && j.success){ 
        MobileUI.toast('任务已创建'); 
        setTimeout(() => location.href = '/m/workbench/', 500);
    }
    else { MobileUI.toast((j && j.message) || '创建失败'); btn.disabled = false; btn.textContent = '立即创建'; }
  }catch(err){ MobileUI.toast('网络错误'); btn.disabled = false; btn.textContent = '立即创建'; }
  return false;
}
</script>
</body>
</html>
