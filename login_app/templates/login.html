{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>员工登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
    body { min-height: 100vh; background: linear-gradient(135deg,#f6f8ff,#f1f3f5); }
    .login-card { border: 0; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
    .brand { font-weight: 700; letter-spacing: .5px; }
    .hint { font-size: 12px; color: #868e96; }
    </style>
    
</head>
<body class="d-flex align-items-center py-4">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-5 col-lg-4">
            <div class="card login-card">
                <div class="card-body p-4">
                    <div class="text-center mb-3">
                        <div class="brand h4 mb-1">Pandora</div>
                        <div class="hint">请使用工号与密码登录</div>
                    </div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="work_id" class="form-label">工号</label>
                            <input type="text" class="form-control form-control-lg" id="work_id" placeholder="请输入工号" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">密码</label>
                            <input type="password" class="form-control form-control-lg" id="password" placeholder="请输入密码" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">登录</button>
                    </form>

                    <div id="message" class="text-center mt-3 text-danger"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    await performLogin(false);
});

async function performLogin(force) {
    const work_id = document.getElementById('work_id').value;
    const password = document.getElementById('password').value;
    const messageDiv = document.getElementById('message');
    const btn = document.querySelector('#loginForm button[type=\"submit\"]');
    if (btn && btn.disabled) return;
    if (btn) { btn.disabled = true; btn.textContent = '登录中...'; }

    try {
        const response = await axios.post('/login_app/login/', new URLSearchParams({
            work_id: work_id,
            password: password,
            force_login: force
        }));
        const data = response.data;
        
        if (data.success) {
            messageDiv.classList.remove('text-danger');
            messageDiv.classList.add('text-success');
            messageDiv.textContent = '登录成功，正在跳转...';
            setTimeout(() => {
                const ua = navigator.userAgent || '';
                const isMobile = /(Mobile|Android|iPhone|iPad|iPod|Windows Phone|webOS)/i.test(ua);
                window.location.href = isMobile ? '/m/' : '/dashboard/';
            }, 500);
        } else if (data.code === 'ALREADY_LOGGED_IN') {
            const ok = window.confirm ? confirm(data.message) : true;
            if (ok) { await performLogin(true); } else { messageDiv.textContent = '已取消登录'; }
        } else {
            messageDiv.textContent = data.message;
        }
    } catch (error) {
        messageDiv.textContent = '请求失败，请检查网络或服务器状态';
    } finally {
        if (btn) { btn.disabled = false; btn.textContent = '登录'; }
    }
}

const ALREADY_LOGGED_IN = {% if already_logged_in %}true{% else %}false{% endif %};
const REDIRECT_URL = "{{ redirect_url|default:'/dashboard/' }}";
const KICKED = {% if kicked %}true{% else %}false{% endif %};
document.addEventListener('DOMContentLoaded', function(){
    const messageDiv = document.getElementById('message');
    const params = new URLSearchParams(window.location.search||'');
    const inFrame = window.top !== window.self;
    if (KICKED) {
        messageDiv.textContent = '已被下线，请重新登录';
    }
    if (ALREADY_LOGGED_IN && !inFrame && params.get('embed') !== '1') {
        messageDiv.classList.remove('text-danger');
        messageDiv.classList.add('text-success');
        messageDiv.textContent = '已登录';
        setTimeout(function(){ try { window.close(); } catch(e){} }, 500);
        setTimeout(function(){ window.location.href = REDIRECT_URL; }, 1200);
    }
});

</script>

</body>
</html>
