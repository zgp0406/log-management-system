<!-- FILE: mobile_ui.html -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F5F7FA">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/static/manifest.webmanifest">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">

<!-- 引入 Bootstrap 5 & FontAwesome -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<!-- 保留 Bootstrap Icons 以防兼容旧代码 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
/* 全局变量定义 */
:root {
  /* 高级蓝配色体系 - 更加商务、沉稳 */
  --primary-color: #0056b3; 
  --primary-grad: linear-gradient(135deg, #0062cc 0%, #004a99 100%);
  --secondary-color: #6c757d;
  --bg-body: #f4f6f9; /* 更干净的灰白背景 */
  --glass-bg: rgba(255, 255, 255, 0.95); /* 减少透明度，增加质感 */
  --glass-border: 1px solid rgba(0,0,0,0.05);
  --shadow-soft: 0 8px 24px rgba(0, 86, 179, 0.08); /* 蓝色系微投影 */
  --border-radius-lg: 16px;
}

/* 基础重置 */
body {
  background-color: var(--bg-body);
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; /* 优化中文字体栈 */
  color: #2c3e50;
  padding-bottom: calc(80px + env(safe-area-inset-bottom));
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

/* 状态样式 */
.empty-state { padding: 40px 20px; text-align: center; color: #9CA3AF; font-size: 14px; }
.error-state { padding: 20px; text-align: center; color: #EF4444; font-size: 14px; }

/* 页面转场动画 */
.fade-target { opacity: 0; transition: opacity 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
.fade-target.fade-in { opacity: 1; }
.fade-target.fade-out { opacity: 0; }

/* Toast 提示框 (iOS 风格) */
.mobile-toast { 
  position: fixed; top: 50%; left: 50%; 
  transform: translate(-50%, -50%) scale(0.9); 
  background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  color: #fff; 
  padding: 12px 24px; 
  border-radius: 50px; 
  font-size: 15px; font-weight: 500;
  z-index: 9999; 
  opacity: 0; pointer-events: none;
  transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  white-space: nowrap;
}
.mobile-toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

/* 滚动条隐藏 */
::-webkit-scrollbar { width: 0px; background: transparent; }
</style>

<script>
window.MobileUI = (function(){
  function empty(el, msg){ el.innerHTML = `<div class="empty-state"><i class="far fa-folder-open fa-2x mb-2" style="opacity:0.5"></i><br>${msg||'暂无数据'}</div>`; }
  function error(el, msg){ el.innerHTML = `<div class="error-state"><i class="fas fa-exclamation-circle me-1"></i> ${msg||'加载失败'}</div>`; }
  
  function fadeIn(selectorOrEl){
    const el = typeof selectorOrEl === 'string' ? document.querySelector(selectorOrEl) : selectorOrEl;
    if(!el) return;
    el.classList.add('fade-target');
    requestAnimationFrame(()=>{ el.classList.add('fade-in'); });
  }
  
  function bindNavFade(rootSelector){
    const root = document.querySelector(rootSelector) || document;
    root.addEventListener('click', (e)=>{
      const a = e.target.closest('a');
      if(!a) return;
      const href = a.getAttribute('href');
      if(!href || href.startsWith('#') || href.startsWith('javascript') || a.target === '_blank') return;
      
      e.preventDefault();
      const page = document.querySelector('.fade-target') || document.body;
      page.classList.remove('fade-in');
      page.classList.add('fade-out');
      setTimeout(()=>{ window.location.href = href; }, 200); // Wait for animation
    });
  }
  
  function toast(message, duration){
    const existing = document.querySelector('.mobile-toast');
    if(existing) existing.remove();
    
    const d = document.createElement('div');
    d.className = 'mobile-toast'; 
    d.innerHTML = message || ''; // Allow HTML
    document.body.appendChild(d);
    
    requestAnimationFrame(()=> d.classList.add('show'));
    setTimeout(()=>{ 
      d.classList.remove('show'); 
      setTimeout(()=> d.remove(), 200); 
    }, duration || 2000);
  }
  
  function haptic(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms||10); }catch(e){} }
  
  return { empty, error, fadeIn, bindNavFade, toast, haptic };
})();

// Service Worker (保持原样)
(function(){
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('/static/js/sw.js').catch(function(){});
    });
  }
})();
</script>
