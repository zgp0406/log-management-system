<!-- FILE: mobile_nav.html -->
{% load static %}
<style>
/* 底部导航容器 */
.navbar-glass {
  position: {% if nav_position == 'relative' %}relative{% else %}fixed{% endif %}; bottom: 0; left: 0; width: 100%;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(0,0,0,0.05);
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 2000; /* 提高层级，确保在最上层 */
  box-shadow: 0 -5px 20px rgba(0,0,0,0.02);
  {% if nav_position == 'relative' %}margin-top: 20px;{% endif %}
}

.nav-grid {
  display: flex; justify-content: space-around; align-items: center;
  height: 60px; /* 标准高度 */
}

/* 导航项 */
.nav-item-link {
  flex: 1; 
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-decoration: none; color: #9CA3AF;
  transition: all 0.2s ease;
  position: relative;
  height: 100%;
}

.nav-icon { font-size: 20px; margin-bottom: 3px; transition: transform 0.2s; }
.nav-label { font-size: 10px; font-weight: 500; transform: scale(0.9); transition: transform 0.2s; }

/* 激活状态 */
.nav-item-link.active { color: #0056b3; }
.nav-item-link.active .nav-icon { transform: translateY(-2px); }
.nav-item-link.active .nav-label { font-weight: 700; transform: scale(1); }

/* 点击反馈 */
.nav-item-link:active { opacity: 0.7; transform: scale(0.95); }

/* 工作台弹出菜单 (Popver) */
.wb-menu-overlay {
  position: fixed; inset: 0; z-index: 1400; display: none;
  background: rgba(0,0,0,0.2); backdrop-filter: blur(2px);
  animation: fadeIn 0.2s;
}
.wb-menu-box {
  position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%) scale(0.9);
  background: #fff;
  border-radius: 16px;
  padding: 8px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  display: flex; gap: 8px;
  opacity: 0; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  width: 200px;
}
.wb-menu-box.show { opacity: 1; transform: translateX(-50%) scale(1); }

/* 菜单箭头 */
.wb-menu-box::after {
  content: ''; position: absolute; bottom: -8px; left: 50%; margin-left: -8px;
  border-width: 8px 8px 0; border-style: solid;
  border-color: #fff transparent transparent transparent;
}

.wb-btn {
  flex: 1; text-align: center; padding: 12px 0;
  border-radius: 10px; text-decoration: none; font-size: 13px; font-weight: 600;
  transition: background 0.1s;
}
.wb-btn-primary { background: #e7f1ff; color: #0056b3; }
.wb-btn-secondary { background: #f8f9fa; color: #495057; }
.wb-btn:active { transform: scale(0.96); }

@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
</style>

<!-- 遮罩层 + 菜单 -->
<div id="wbOverlay" class="wb-menu-overlay">
  <div id="wbMenu" class="wb-menu-box">
    <a class="wb-btn wb-btn-primary" id="wbToTasks" href="/m/tasks/">
      <i class="fas fa-check-double mb-1 d-block" style="font-size:18px;"></i> 任务
    </a>
    <a class="wb-btn wb-btn-secondary" id="wbToLogs" href="/m/logs/">
      <i class="fas fa-book mb-1 d-block" style="font-size:18px;"></i> 日志
    </a>
  </div>
</div>

<nav class="navbar-glass">
  <div class="nav-grid">
    <a class="nav-item-link" id="tabHome" href="/m/">
      <i class="nav-icon fas fa-home"></i>
      <span class="nav-label">首页</span>
    </a>
    <a class="nav-item-link" id="tabViews" href="/m/views/">
      <i class="nav-icon far fa-calendar-alt"></i>
      <span class="nav-label">视图</span>
    </a>
    
    <!-- 工作台 (中心大按钮) -->
    <a class="nav-item-link" id="tabWorkbench" href="#">
      <div style="background: linear-gradient(135deg, #0056b3, #004494); width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 12px rgba(0, 86, 179, 0.3); margin-bottom: 4px; border: 2px solid #fff;">
        <i class="fas fa-th-large" style="font-size: 20px;"></i>
      </div>
    </a>

    <a class="nav-item-link" id="tabAI" href="/m/ai/">
      <i class="nav-icon fas fa-magic"></i>
      <span class="nav-label">AI</span>
    </a>
    <a class="nav-item-link" id="tabMe" href="/m/me/">
      <i class="nav-icon far fa-user"></i>
      <span class="nav-label">我的</span>
    </a>
  </div>
</nav>

<script>
(function(){
  // 1. 高亮当前 Tab
  const p = location.pathname;
  const setActive = (id) => {
    document.querySelectorAll('.nav-item-link').forEach(el => el.classList.remove('active'));
    const el = document.getElementById(id); 
    if(el) el.classList.add('active');
  };

  if(p === '/m/' || p === '/m') setActive('tabHome');
  else if(p.startsWith('/m/views/')) setActive('tabViews');
  else if(p.startsWith('/m/ai/')) setActive('tabAI');
  else if(p.startsWith('/m/me/')) setActive('tabMe');
  // 如果在任务或日志页面，点亮工作台
  else if(p.startsWith('/m/tasks/') || p.startsWith('/m/logs/') || p.startsWith('/m/workbench/')) {
      // 工作台本身没有 active 样式，因为它是中心按钮，但可以保持默认
      const wb = document.getElementById('tabWorkbench');
      if(wb) {
        const d = wb.querySelector('div');
        if(d) d.style.boxShadow = '0 4px 10px rgba(79, 70, 229, 0.4), 0 0 0 2px #C7D2FE';
      }
  }

  // 2. 工作台菜单交互
  const wbBtn = document.getElementById('tabWorkbench');
  const overlay = document.getElementById('wbOverlay');
  const menu = document.getElementById('wbMenu');
  const btnTasks = document.getElementById('wbToTasks');
  const btnLogs = document.getElementById('wbToLogs');

  // 默认样式
  btnTasks.className = 'wb-btn wb-btn-secondary';
  btnLogs.className = 'wb-btn wb-btn-secondary';

  // 根据当前页面高亮菜单项
  if(p.startsWith('/m/logs/')){
      btnLogs.className = 'wb-btn wb-btn-primary';
  } else if(p.startsWith('/m/tasks/')){
      btnTasks.className = 'wb-btn wb-btn-primary';
  }

  function showMenu() {
    overlay.style.display = 'block';
    // 强制重绘以触发 transition
    requestAnimationFrame(() => menu.classList.add('show'));
    if(window.MobileUI && MobileUI.haptic) MobileUI.haptic(15);
  }

  function hideMenu() {
    menu.classList.remove('show');
    setTimeout(() => { overlay.style.display = 'none'; }, 200);
  }

  if(wbBtn){
    wbBtn.addEventListener('click', (e) => {
      e.preventDefault();
      // 如果当前已经在 workbench 页面，也可以选择不弹菜单直接跳转，或者弹菜单
      // 这里逻辑是：点击中间按钮弹出快捷菜单
      if(menu.classList.contains('show')) hideMenu();
      else showMenu();
    });
  }

  // 点击遮罩关闭
  overlay.addEventListener('click', (e) => {
    if(e.target === overlay) hideMenu();
  });
})();
</script>
